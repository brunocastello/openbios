name: Build OpenBIOS PPC

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/openbios/openbios-builder:master

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure for PPC
        run: ./config/scripts/switch-arch ppc

      - name: Build release
        run: make V=1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openbios-ppc-latest
          path: |
            obj-ppc/openbios-qemu.elf
            obj-ppc/QEMU,VGA.bin
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: openbios-ppc-latest

      - name: Package
        run: zip openbios-ppc-${{ github.ref_name }}.zip openbios-qemu.elf QEMU,VGA.bin

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: openbios-ppc-${{ github.ref_name }}.zip
          prerelease: false
